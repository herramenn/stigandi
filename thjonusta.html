<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Þjónusta | Stígandi sjúkraþjálfun</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0174BD;
  --blue-dark:#015a94;
  --blue-tint:#eaf3fa;
  --navy:#0e2433;
  --ink:#152430;
  --muted:#54646f;
  --line:#e3e9ee;
  --bg:#ffffff;
  --bg-soft:#f3f7fa;
  --r-lg:20px;
  --r-md:14px;
  --shadow-lg:0 20px 50px -18px rgba(10,40,70,.28);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Bricolage Grotesque",-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.65;font-size:16.5px}
img{max-width:100%;display:block}
a{color:var(--blue)}
h1,h2{text-wrap:balance}
.wrap{max-width:860px;margin:0 auto;padding:0 24px}

header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;height:76px;max-width:1140px;margin:0 auto;padding:0 24px}
.nav img{height:42px;width:auto}
.nav ul{display:flex;gap:6px;list-style:none;align-items:center}
.nav ul a{color:var(--ink);text-decoration:none;font-size:.95rem;font-weight:500;padding:9px 14px;border-radius:99px;transition:background .15s,color .15s}
.nav ul a:hover{background:var(--blue-tint);color:var(--blue-dark)}
.nav .cta{background:var(--navy);color:#fff}
.nav .cta:hover{background:var(--blue);color:#fff}
@media(max-width:760px){.nav ul{display:none}}

.backlink{display:inline-flex;align-items:center;gap:6px;margin:30px 0 0;color:var(--muted);text-decoration:none;font-size:.94rem;font-weight:600}
.backlink:hover{color:var(--blue)}

.hero-img{width:100%;height:clamp(200px,32vw,340px);object-fit:cover;border-radius:var(--r-lg);margin-top:20px;box-shadow:var(--shadow-lg)}
h1{font-size:clamp(1.9rem,4.4vw,2.9rem);font-weight:800;letter-spacing:-.02em;margin:30px 0 8px;line-height:1.12}
.summary{color:var(--muted);font-size:1.12rem;margin-bottom:26px;max-width:56ch}

.content h4{color:var(--blue-dark);font-size:1.25rem;font-weight:700;letter-spacing:-.01em;margin:34px 0 8px}
.content p{margin:11px 0;max-width:70ch;color:#2c3b46}
.content ul{margin:12px 0 12px 4px;list-style:none}
.content li{margin:7px 0;padding-left:26px;position:relative;color:#2c3b46}
.content li::before{content:"";position:absolute;left:0;top:.52em;width:14px;height:14px;border-radius:50%;background:var(--blue-tint);box-shadow:inset 0 0 0 4.5px var(--blue)}

.btn{display:inline-flex;align-items:center;gap:9px;padding:14px 28px;border-radius:99px;text-decoration:none;font-weight:600;font-size:1rem;border:0;cursor:pointer;font-family:inherit;transition:background .18s,color .18s,transform .18s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1d8ad1;transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--blue-dark);box-shadow:inset 0 0 0 1.5px var(--blue)}
.btn-ghost:hover{background:var(--blue-tint)}
.cta-row{display:flex;gap:12px;flex-wrap:wrap;margin:34px 0 10px}

#shop{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(9,24,36,.65);backdrop-filter:blur(4px);padding:max(2.5vh,14px) 14px}
#shop.open{display:flex}
.shop-card{background:#fff;border-radius:var(--r-lg);width:100%;max-width:960px;height:min(92vh,980px);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg)}
.shop-head{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--line);flex-shrink:0}
.shop-head h2{font-size:1.1rem;font-weight:700;letter-spacing:-.01em}
.shop-head .shop-sub{font-size:.85rem;color:var(--muted);margin-left:auto}
.shop-head .shop-sub a{font-weight:600}
.shop-close{background:var(--bg-soft);border:0;width:36px;height:36px;border-radius:50%;font-size:1.3rem;color:var(--muted);cursor:pointer;line-height:1;flex-shrink:0;transition:background .15s,color .15s}
.shop-close:hover{background:var(--blue-tint);color:var(--blue-dark)}
#shop iframe{flex:1;width:100%;border:0;background:var(--bg-soft)}

.notfound{text-align:center;padding:90px 0}

/* photo gallery (services with gallery jsonb) */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin:34px 0 10px}
.gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:var(--r-md);box-shadow:0 8px 24px -10px rgba(10,40,70,.22)}

/* course tiles */
.course-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-top:34px}
.ctile{display:flex;flex-direction:column;gap:8px;background:var(--navy);color:#fff;border-radius:var(--r-lg);padding:26px 26px 22px;text-decoration:none;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.ctile::before{content:"";position:absolute;top:-120px;right:-110px;width:280px;height:280px;border-radius:50%;background:radial-gradient(closest-side,rgba(1,116,189,.4),transparent 70%)}
.ctile:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.ctile h3{font-size:1.25rem;font-weight:700;letter-spacing:-.01em;position:relative}
.ctile p{font-size:.93rem;color:#c2d3de;position:relative;max-width:44ch}
.ctile .price{position:relative;font-size:.85rem;font-weight:700;color:#7cc4f0;margin-top:2px}
.ctile .next{position:relative;font-size:.83rem;color:#c2d3de}
.ctile .go{position:relative;display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-weight:700;font-size:.92rem;color:#fff}
.ctile .go::after{content:"→";transition:transform .25s}
.ctile:hover .go::after{transform:translateX(5px)}

footer{background:var(--navy);color:#b9cbd8;padding:44px 0;margin-top:80px}
footer .wrap{max-width:1140px;display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;font-size:.94rem}
footer b{color:#fff}
footer a{color:#8ec6f0;text-decoration:none}
footer a:hover{text-decoration:underline}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html"><img src="assets/logo.png" alt="Stígandi sjúkraþjálfun"></a>
    <ul>
      <li><a href="index.html#thjonusta">Þjónusta</a></li>
      <li><a href="index.html#tilkynningar">Tilkynningar</a></li>
      <li><a href="index.html#starfsfolk">Starfsfólk</a></li>
      <li><a href="index.html#gjaldskra">Gjaldskrá</a></li>
      <li><a href="index.html#samband" class="cta">Hafa samband</a></li>
    </ul>
  </div>
</header>

<div class="wrap">
  <a class="backlink" href="index.html#thjonusta">← Öll þjónusta</a>
  <div id="page"><p style="color:var(--muted);margin-top:30px">Sæki efni…</p></div>

  <div id="shop" role="dialog" aria-modal="true" aria-label="Vefverslun">
    <div class="shop-card">
      <div class="shop-head">
        <h2>Kaupa / skrá</h2>
        <span class="shop-sub">Öruggt greiðsluferli hjá Abler · <a id="shop-newwin" href="#" target="_blank" rel="noopener">Opna í nýjum glugga ↗</a></span>
        <button class="shop-close" id="shop-close" aria-label="Loka">×</button>
      </div>
      <iframe id="shop-frame" title="Vefverslun" loading="lazy" allow="payment"></iframe>
    </div>
  </div>
</div>

<footer>
  <div class="wrap">
    <div><b>Stígandi sjúkraþjálfun</b><br>Heilsuklasinn, Bíldshöfða 9, 110 Reykjavík</div>
    <div><a href="tel:+3545991600">599 1600</a><br><a href="mailto:mottaka@stigandi.is">mottaka@stigandi.is</a></div>
    <div>Opið mán–fös<br>kl. 8:00 – 17:00</div>
  </div>
</footer>

<script>
const SB_URL = 'https://zzcfyeylqojvzewfpehv.supabase.co';
const SB_KEY = 'sb_publishable_8dDmyIaz6Ygu9_bVXYjGmg_9sRgt3kF';
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function svcHtml(body) {
  let out = '', inList = false;
  for (let line of (body || '').split('\n')) {
    line = line.trim();
    if (!line) continue;
    const isB = line.startsWith('- ');
    if (isB && !inList) { out += '<ul>'; inList = true; }
    if (!isB && inList) { out += '</ul>'; inList = false; }
    if (line.startsWith('## ')) out += `<h4>${esc(line.slice(3))}</h4>`;
    else if (isB) out += `<li>${esc(line.slice(2))}</li>`;
    else out += `<p>${esc(line)}</p>`;
  }
  return out + (inList ? '</ul>' : '');
}

function openShop(url) {
  const frame = document.getElementById('shop-frame');
  if (frame.src !== url) frame.src = url;
  document.getElementById('shop-newwin').href = url;
  document.getElementById('shop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeShop() {
  document.getElementById('shop').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('shop-close').onclick = closeShop;
document.getElementById('shop').addEventListener('click', e => { if (e.target === document.getElementById('shop')) closeShop(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeShop(); });

const slug = decodeURIComponent(location.hash.slice(1) || '');
fetch(`${SB_URL}/rest/v1/services?slug=eq.${encodeURIComponent(slug)}&hidden=eq.false&select=*`, { headers: { apikey: SB_KEY } })
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(([s]) => {
    const page = document.getElementById('page');
    if (!s) {
      page.innerHTML = '<div class="notfound"><h1>Síða fannst ekki</h1><p><a href="index.html#thjonusta">Skoða alla þjónustu</a></p></div>';
      return;
    }
    document.title = s.title + ' | Stígandi sjúkraþjálfun';
    if (s.kind === 'page') {
      const bl = document.querySelector('.backlink');
      bl.href = 'index.html';
      bl.textContent = '← Forsíða';
    }
    const links = (s.links && s.links.length) ? s.links : [];
    const gallery = (s.gallery || []).map(u => `<img src="${esc(u)}" alt="${esc(s.title)}" loading="lazy">`).join('');
    page.innerHTML = `
      ${s.photo_url ? `<img class="hero-img" src="${esc(s.photo_url)}" alt="${esc(s.title)}">` : ''}
      <h1>${esc(s.title)}</h1>
      ${s.summary ? `<p class="summary">${esc(s.summary)}</p>` : ''}
      <div class="cta-row" id="cta-top"></div>
      <div class="content">${svcHtml(s.body)}</div>
      ${gallery ? `<div class="gallery">${gallery}</div>` : ''}
      <div id="course-tiles" class="course-tiles"></div>
      <div class="cta-row" id="cta-bottom"></div>`;
    loadCourses(s.slug).catch(() => {
      document.getElementById('course-tiles').innerHTML = '<p style="grid-column:1/-1;color:var(--muted)">Ekki tókst að sækja námskeiðin. <a href="">Reyna aftur</a></p>';
    });
    const btnHtml = links.map((l, i) => l.embed
      ? `<button class="btn btn-primary" data-shop="${esc(l.url)}">${esc(l.label || 'Kaupa')}</button>`
      : `<a class="btn ${i === 0 ? 'btn-primary' : 'btn-ghost'}" href="${esc(l.url)}">${esc(l.label || 'Nánar')}</a>`).join('');
    document.getElementById('cta-bottom').innerHTML = btnHtml;
    if (s.body && s.body.length > 400) document.getElementById('cta-top').innerHTML = btnHtml;
    document.querySelectorAll('[data-shop]').forEach(b => b.onclick = () => openShop(b.dataset.shop));
  })
  .catch(() => {
    document.getElementById('page').innerHTML = '<div class="notfound"><h1>Ekki tókst að sækja efni</h1><p style="color:var(--muted);margin:10px 0 22px">Athugaðu nettengingu og reyndu aftur.</p><button class="btn btn-primary" onclick="location.reload()">Reyna aftur</button></div>';
  });
const MAN = ['janúar','febrúar','mars','apríl','maí','júní','júlí','ágúst','september','október','nóvember','desember'];
async function loadCourses(serviceSlug) {
  const hdrs = { apikey: SB_KEY };
  const today = new Date().toISOString().slice(0, 10);
  const ok = r => { if (!r.ok) throw new Error(r.status); return r.json(); };
  const [courses, dates] = await Promise.all([
    fetch(`${SB_URL}/rest/v1/courses?hidden=eq.false&service_slug=eq.${encodeURIComponent(serviceSlug)}&select=slug,title,summary,price,schedule,links,id&order=sort.asc`, { headers: hdrs }).then(ok),
    fetch(`${SB_URL}/rest/v1/course_dates?start_date=gte.${today}&status=eq.open&select=course_id,start_date&order=start_date.asc`, { headers: hdrs }).then(ok)
  ]);
  const nextByCourse = {};
  dates.forEach(d => { if (!nextByCourse[d.course_id]) nextByCourse[d.course_id] = d.start_date; });
  const fmt = iso => { const [y, m, d] = iso.split('-').map(Number); return `${d}. ${MAN[m-1]}`; };
  document.getElementById('course-tiles').innerHTML = courses.map(c => {
    const open = nextByCourse[c.id] || (c.links && c.links.length); // open date or direct signup link
    return `
    <a class="ctile" href="namskeid.html#${esc(c.slug)}">
      <h3>${esc(c.title)}</h3>
      <p>${esc(c.summary || '')}</p>
      ${c.price ? `<span class="price">${esc(c.price)}</span>` : ''}
      <span class="next">${nextByCourse[c.id] ? 'Næsta námskeið: ' + fmt(nextByCourse[c.id]) : esc(c.schedule || 'Dagsetningar auglýstar fljótlega')}</span>
      <span class="go">${open ? 'Skráning' : 'Skrá á biðlista'}</span>
    </a>`;
  }).join('');
}
window.addEventListener('hashchange', () => location.reload());
</script>
</body>
</html>
