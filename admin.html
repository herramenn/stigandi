<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stjórnborð | Stígandi sjúkraþjálfun</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="assets/logo.png">
<style>
:root{--blue:#0174BD;--blue-dark:#015a94;--ink:#1a1a1a;--muted:#5c6670;--bg-soft:#f2f6f9;--red:#c0392b;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg-soft);line-height:1.5}
.wrap{max-width:820px;margin:0 auto;padding:24px 16px 80px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
header img{height:38px}
h1{font-size:1.4rem}
h2{font-size:1.15rem;margin-bottom:12px}
.panel{background:#fff;border-radius:var(--radius);padding:20px;margin-bottom:24px;box-shadow:0 1px 8px rgba(10,40,70,.07)}
label{display:block;font-size:.85rem;font-weight:600;margin:10px 0 4px}
input[type=text],input[type=email],input[type=password],input[type=date],textarea{width:100%;padding:10px;border:1px solid #ccd6de;border-radius:8px;font:inherit}
textarea{min-height:90px;resize:vertical}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
button{font:inherit;font-weight:600;border:0;border-radius:8px;padding:10px 18px;cursor:pointer}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-dark)}
.btn-line{background:none;border:1px solid #ccd6de;color:var(--ink)}
.btn-del{background:none;border:1px solid #e5c4c0;color:var(--red);padding:6px 12px;font-size:.85rem}
.btn-small{padding:6px 12px;font-size:.85rem}
.item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #eef2f5}
.item:last-child{border-bottom:0}
.item img,.item .noimg{width:44px;height:56px;object-fit:cover;border-radius:6px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.item .info{flex:1;min-width:0}
.item .info .t{font-size:.82rem;color:var(--muted)}
.tag{font-size:.72rem;background:#eef4fa;color:var(--blue-dark);padding:2px 8px;border-radius:99px}
.msg{padding:10px 14px;border-radius:8px;margin:12px 0;font-size:.9rem;display:none}
.msg.ok{display:block;background:#e8f6ec;color:#1e7a3a}
.msg.err{display:block;background:#fbeaea;color:var(--red)}
#app{display:none}
.muted{color:var(--muted);font-size:.85rem}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="assets/logo.png" alt="Stígandi">
    <div class="row">
      <a href="index.html" class="muted" style="text-decoration:none">Skoða vefsíðu</a>
      <button id="logout" class="btn-line btn-small" style="display:none">Útskrá</button>
    </div>
  </header>

  <div id="login" class="panel">
    <h1>Stjórnborð</h1>
    <p class="muted" style="margin-top:4px">Skráðu þig inn til að breyta starfsfólki og tilkynningum.</p>
    <label>Netfang</label><input type="email" id="email" autocomplete="username">
    <label>Lykilorð</label><input type="password" id="password" autocomplete="current-password">
    <div class="msg err" id="login-err"></div>
    <button class="btn-blue" id="login-btn" style="margin-top:14px">Innskrá</button>
  </div>

  <div id="app">
    <div class="panel">
      <h2>Tilkynningar og tilboð</h2>
      <div id="news-list"></div>
      <hr style="border:0;border-top:1px solid #eef2f5;margin:16px 0">
      <strong style="font-size:.95rem">Ný tilkynning</strong>
      <label>Titill</label><input type="text" id="n-title">
      <label>Dagsetning</label><input type="date" id="n-date">
      <label>Texti</label><textarea id="n-body"></textarea>
      <div class="msg" id="n-msg"></div>
      <button class="btn-blue" id="n-add" style="margin-top:12px">Birta tilkynningu</button>
    </div>

    <div class="panel">
      <h2>Starfsfólk</h2>
      <div id="staff-list"></div>
      <hr style="border:0;border-top:1px solid #eef2f5;margin:16px 0">
      <strong style="font-size:.95rem">Nýr starfsmaður</strong>
      <label>Nafn</label><input type="text" id="s-name">
      <label>Starfsheiti</label><input type="text" id="s-title" value="Sjúkraþjálfari">
      <label>Mynd (má sleppa)</label><input type="file" id="s-photo" accept="image/*">
      <label class="row" style="font-weight:400;margin-top:12px"><input type="checkbox" id="s-leave"> Í fæðingarorlofi</label>
      <div class="msg" id="s-msg"></div>
      <button class="btn-blue" id="s-add" style="margin-top:12px">Bæta við</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const client = supabase.createClient(
  'https://zzcfyeylqojvzewfpehv.supabase.co',
  'sb_publishable_8dDmyIaz6Ygu9_bVXYjGmg_9sRgt3kF'
);
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const flash = (el, text, ok) => { el.textContent = text; el.className = 'msg ' + (ok ? 'ok' : 'err'); setTimeout(() => el.className = 'msg', 4000); };

async function show() {
  const { data: { session } } = await client.auth.getSession();
  $('login').style.display = session ? 'none' : 'block';
  $('app').style.display = session ? 'block' : 'none';
  $('logout').style.display = session ? 'inline-block' : 'none';
  if (session) { loadNews(); loadStaff(); }
}

$('login-btn').onclick = async () => {
  const { error } = await client.auth.signInWithPassword({ email: $('email').value.trim(), password: $('password').value });
  if (error) { $('login-err').textContent = 'Innskráning tókst ekki – athugaðu netfang og lykilorð.'; $('login-err').className = 'msg err'; return; }
  show();
};
$('password').addEventListener('keydown', e => { if (e.key === 'Enter') $('login-btn').click(); });
$('logout').onclick = async () => { await client.auth.signOut(); show(); };

/* ---- news ---- */
async function loadNews() {
  const { data, error } = await client.from('news').select('*').order('date', { ascending: false });
  if (error) return;
  $('news-list').innerHTML = data.map(n => `
    <div class="item">
      <div class="info"><strong>${esc(n.title)}</strong><div class="t">${esc(n.date)}</div></div>
      <button class="btn-del" data-del-news="${n.id}">Eyða</button>
    </div>`).join('') || '<p class="muted">Engar tilkynningar.</p>';
}
$('n-add').onclick = async () => {
  if (!$('n-title').value.trim()) return flash($('n-msg'), 'Titil vantar.', false);
  const { error } = await client.from('news').insert({
    title: $('n-title').value.trim(),
    body: $('n-body').value.trim(),
    date: $('n-date').value || new Date().toISOString().slice(0, 10)
  });
  if (error) return flash($('n-msg'), 'Villa kom upp – reyndu aftur.', false);
  $('n-title').value = ''; $('n-body').value = ''; $('n-date').value = '';
  flash($('n-msg'), 'Tilkynning birt.', true); loadNews();
};

/* ---- staff ---- */
async function loadStaff() {
  const { data, error } = await client.from('staff').select('*').order('sort').order('name');
  if (error) return;
  $('staff-list').innerHTML = data.map(m => `
    <div class="item">
      ${m.photo_url ? `<img src="${esc(m.photo_url)}">` : `<div class="noimg">${esc(m.name.split(' ').map(w => w[0]).slice(0, 2).join(''))}</div>`}
      <div class="info"><strong>${esc(m.name)}</strong><div class="t">${esc(m.title)}</div></div>
      ${m.on_leave ? '<span class="tag">Í fæðingarorlofi</span>' : ''}
      <button class="btn-line btn-small" data-leave="${m.id}" data-val="${m.on_leave}">${m.on_leave ? 'Komin/n úr orlofi' : 'Skrá í orlof'}</button>
      <button class="btn-del" data-del-staff="${m.id}">Eyða</button>
    </div>`).join('');
}
$('s-add').onclick = async () => {
  const name = $('s-name').value.trim();
  if (!name) return flash($('s-msg'), 'Nafn vantar.', false);
  let photo_url = null;
  const file = $('s-photo').files[0];
  if (file) {
    const path = Date.now() + '-' + file.name.toLowerCase().replace(/[^a-z0-9.]+/g, '-');
    const { error: upErr } = await client.storage.from('photos').upload(path, file);
    if (upErr) return flash($('s-msg'), 'Ekki tókst að hlaða upp mynd.', false);
    photo_url = client.storage.from('photos').getPublicUrl(path).data.publicUrl;
  }
  const { error } = await client.from('staff').insert({
    name, title: $('s-title').value.trim() || 'Sjúkraþjálfari',
    photo_url, on_leave: $('s-leave').checked
  });
  if (error) return flash($('s-msg'), 'Villa kom upp – reyndu aftur.', false);
  $('s-name').value = ''; $('s-title').value = 'Sjúkraþjálfari'; $('s-photo').value = ''; $('s-leave').checked = false;
  flash($('s-msg'), name + ' hefur verið bætt við.', true); loadStaff();
};

document.addEventListener('click', async e => {
  const b = e.target.closest('button'); if (!b) return;
  if (b.dataset.delNews) {
    if (!confirm('Eyða þessari tilkynningu?')) return;
    await client.from('news').delete().eq('id', b.dataset.delNews); loadNews();
  }
  if (b.dataset.delStaff) {
    if (!confirm('Fjarlægja þennan starfsmann af síðunni?')) return;
    await client.from('staff').delete().eq('id', b.dataset.delStaff); loadStaff();
  }
  if (b.dataset.leave) {
    await client.from('staff').update({ on_leave: b.dataset.val !== 'true' }).eq('id', b.dataset.leave); loadStaff();
  }
});

show();
</script>
</body>
</html>
