<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Starfsfólk – drög 2 | Stígandi sjúkraþjálfun</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0174BD;
  --blue-dark:#015a94;
  --blue-tint:#eaf3fa;
  --navy:#0e2433;
  --ink:#152430;
  --muted:#54646f;
  --line:#e3e9ee;
  --bg:#ffffff;
  --bg-soft:#f3f7fa;
  --r-lg:20px;
  --r-md:14px;
  --shadow-lg:0 20px 50px -18px rgba(10,40,70,.28);
  --shadow-md:0 8px 24px -10px rgba(10,40,70,.22);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Bricolage Grotesque",-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;font-size:16.5px}
img{max-width:100%;display:block}
a{color:var(--blue)}
.wrap{max-width:1140px;margin:0 auto;padding:0 24px}
section{padding:clamp(56px,9vw,110px) 0}
.sec-head{max-width:640px;margin-bottom:clamp(28px,4vw,48px)}
.sec-head h2{font-size:clamp(1.8rem,3.4vw,2.6rem);font-weight:700;letter-spacing:-.02em;line-height:1.12;text-wrap:balance}
.sec-head p{color:var(--muted);margin-top:10px;font-size:1.05rem}

.draftbar{background:var(--bg-soft);border-bottom:1px solid var(--line);font-size:.88rem;color:var(--muted)}
.draftbar .wrap{display:flex;align-items:center;gap:14px;height:52px;flex-wrap:wrap}
.draftbar img{height:26px}
.draftbar b{color:var(--ink);font-weight:600}
.draftbar nav{margin-left:auto;display:flex;gap:6px}
.draftbar nav a{text-decoration:none;font-weight:600;padding:4px 12px;border-radius:99px;color:var(--muted)}
.draftbar nav a.on{background:var(--navy);color:#fff}
.draftbar nav a:hover:not(.on){background:var(--blue-tint);color:var(--blue-dark)}

.tag-filters{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:clamp(26px,4vw,40px)}
.tag-filters button{font-family:inherit;font-size:.92rem;font-weight:600;padding:9px 20px;border-radius:99px;border:1.5px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;transition:all .16s}
.tag-filters button:hover{border-color:var(--blue);color:var(--blue)}
.tag-filters button.active{background:var(--navy);border-color:var(--navy);color:#fff}

/* spotlight */
.spot{display:grid;grid-template-columns:minmax(280px,380px) 1fr;gap:clamp(26px,4vw,52px);align-items:start}
.spot-photo{position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:3/4;background:var(--navy);box-shadow:var(--shadow-lg)}
.spot-photo img,.spot-photo .initials{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.spot-photo .initials{display:flex;align-items:center;justify-content:center;font-size:4rem;font-weight:800;color:#fff;background:linear-gradient(145deg,#1d8ad1,var(--navy))}
.spot-detail{min-width:0}
.fade{animation:fadein .35s ease-out}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}}
.spot-detail h3{font-size:clamp(1.5rem,2.6vw,2.1rem);font-weight:800;letter-spacing:-.02em;line-height:1.15;text-wrap:balance}
.spot-detail .title{color:var(--muted);font-size:1.04rem;margin-top:4px}
.spot-detail .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.spot-detail .chip{font-size:.8rem;font-weight:600;background:var(--blue-tint);color:var(--blue-dark);padding:5px 13px;border-radius:99px}
.spot-detail .badge{display:inline-block;font-size:.8rem;font-weight:600;background:#fdf3e3;color:#8a5a00;padding:5px 13px;border-radius:99px}
.spot-detail .preview{margin-top:18px;max-width:58ch}
.spot-detail .preview h4{color:var(--blue-dark);font-size:.98rem;font-weight:700;margin-bottom:4px}
.spot-detail .preview p{font-size:.96rem;color:#33424d;margin:3px 0}
.spot-detail .actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:22px}
.btn{display:inline-flex;align-items:center;gap:9px;padding:12px 24px;border-radius:99px;text-decoration:none;font-weight:600;font-size:.97rem;border:0;cursor:pointer;font-family:inherit;background:var(--blue);color:#fff;transition:background .18s,transform .18s}
.btn:hover{background:#1d8ad1;transform:translateY(-1px)}
.spot-detail .actions a.mail{font-size:.94rem;font-weight:500}

/* thumb rail */
.rail{margin-top:clamp(30px,4vw,44px)}
.rail-label{font-size:.9rem;font-weight:600;color:var(--muted);margin-bottom:12px}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px}
.thumb{position:relative;border:0;padding:0;background:var(--navy);border-radius:12px;overflow:hidden;aspect-ratio:3/4;cursor:pointer;transition:transform .2s,box-shadow .2s;font-family:inherit}
.thumb img,.thumb .initials{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.thumb .initials{display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800;color:#fff;background:linear-gradient(145deg,#1d8ad1,var(--navy))}
.thumb::after{content:"";position:absolute;inset:0;border-radius:12px;box-shadow:inset 0 0 0 0 var(--blue);transition:box-shadow .2s}
.thumb:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.thumb[aria-current="true"]::after{box-shadow:inset 0 0 0 3px var(--blue)}
.thumb[aria-current="true"]{transform:translateY(-3px)}

@media(max-width:700px){
  .spot{grid-template-columns:1fr}
  .spot-photo{max-width:320px}
  .thumbs{grid-template-columns:repeat(auto-fill,minmax(68px,1fr))}
}

#modal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-start;justify-content:center;background:rgba(9,24,36,.6);backdrop-filter:blur(4px);padding:5vh 18px;overflow-y:auto}
#modal.open{display:flex}
.modal-card{background:#fff;border-radius:var(--r-lg);max-width:660px;width:100%;padding:34px;position:relative;margin-bottom:5vh;box-shadow:var(--shadow-lg)}
.modal-close{position:absolute;top:14px;right:16px;background:var(--bg-soft);border:0;width:36px;height:36px;border-radius:50%;font-size:1.3rem;color:var(--muted);cursor:pointer;line-height:1;transition:background .15s,color .15s}
.modal-close:hover{background:var(--blue-tint);color:var(--blue-dark)}
.modal-head{display:flex;gap:20px;align-items:center;margin-bottom:18px}
.modal-head img,.modal-head .initials{width:92px;height:118px;object-fit:cover;border-radius:var(--r-md);flex-shrink:0}
.modal-head .initials{display:flex;align-items:center;justify-content:center;font-size:1.9rem;font-weight:800;color:#fff;background:linear-gradient(145deg,#1d8ad1,var(--navy))}
.modal-head h3{font-size:1.4rem;font-weight:700;letter-spacing:-.015em;line-height:1.25}
.modal-head .title{color:var(--muted);font-size:.92rem;margin-top:3px}
.modal-head a{font-size:.92rem;font-weight:500}
.modal-bio h4{color:var(--blue-dark);margin:20px 0 6px;font-size:1.02rem;font-weight:700}
.modal-bio p{font-size:.95rem;margin:4px 0;color:#33424d}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div class="draftbar">
  <div class="wrap">
    <img src="assets/logo.png" alt="Stígandi">
    <span><b>Drög – Starfsfólk</b> · Útgáfa 2: Kastljós</span>
    <nav aria-label="Útgáfur">
      <a href="starfsfolk-v1.html">1</a>
      <a class="on" href="starfsfolk-v2.html" aria-current="true">2</a>
      <a href="starfsfolk-v3.html">3</a>
      <a href="index.html#starfsfolk">Núverandi ↗</a>
    </nav>
  </div>
</div>

<section id="starfsfolk">
  <div class="wrap">
    <div class="sec-head">
      <h2>Starfsfólkið</h2>
      <p>Sjúkraþjálfarar með fjölbreytta sérþekkingu – veldu andlit til að kynnast fólkinu, eða síaðu eftir sérsviði.</p>
    </div>
    <div id="tag-filters" class="tag-filters"></div>
    <div class="spot">
      <div class="spot-photo" id="spot-photo"></div>
      <div class="spot-detail" id="spot-detail" aria-live="polite"></div>
    </div>
    <div class="rail">
      <div class="rail-label" id="rail-label"></div>
      <div class="thumbs" id="thumbs"></div>
    </div>
  </div>
</section>

<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-card">
    <button class="modal-close" aria-label="Loka">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const MAN = ['janúar','febrúar','mars','apríl','maí','júní','júlí','ágúst','september','október','nóvember','desember'];
const isDate = d => { const [y,m,day] = (d||'').split('-').map(Number); return y ? `${day}. ${MAN[m-1]} ${y}` : ''; };
const SB_URL = 'https://zzcfyeylqojvzewfpehv.supabase.co';
const SB_KEY = 'sb_publishable_8dDmyIaz6Ygu9_bVXYjGmg_9sRgt3kF';
const sb = path => fetch(`${SB_URL}/rest/v1/${path}`, { headers: { apikey: SB_KEY } }).then(r => r.json());

let STAFF = [], current = null;
const BIO_SECTIONS = [['Starfssvið','starfssvid'],['Sérhæfing','serhaefing'],['Menntun / námskeið','menntun'],['Starfsferill','starfsferill'],['Félagsstörf / áhugamál','ahugamal']];
const hasBio = m => BIO_SECTIONS.some(([, f]) => m[f]);
const bioHtml = m => BIO_SECTIONS.map(([label, f]) => m[f]
  ? `<h4>${label}</h4>` + m[f].split('\n').filter(l => l.trim()).map(l => `<p>${esc(l)}</p>`).join('')
  : '').join('');
const photoOrInitials = (m, cls = '') => {
  const initials = m.name.split(' ').map(w => w[0]).slice(0,2).join('');
  return m.photo_url ? `<img src="${esc(m.photo_url)}" alt="${esc(m.name)}" loading="lazy">` : `<div class="initials">${esc(initials)}</div>`;
};

const TAGS = ['Allir','Öldrun','Stoðkerfi','Gigt','Hjarta og lungu','Íþróttir','Kvenheilsa','Svimi/jafnvægi','Höfuðhögg'];
let activeTag = 'Allir';
const filtered = () => activeTag === 'Allir' ? STAFF : STAFF.filter(m => (m.tags || []).includes(activeTag));

/* preview: first bio section that has content, first 3 lines */
function previewHtml(m) {
  for (const [label, f] of BIO_SECTIONS) {
    if (!m[f]) continue;
    const lines = m[f].split('\n').filter(l => l.trim()).slice(0, 3);
    return `<div class="preview"><h4>${label}</h4>${lines.map(l => `<p>${esc(l)}</p>`).join('')}</div>`;
  }
  return '';
}

function showPerson(m) {
  current = m;
  document.getElementById('spot-photo').innerHTML = `<div class="fade" style="position:absolute;inset:0">${photoOrInitials(m)}</div>`;
  document.getElementById('spot-detail').innerHTML = `
    <div class="fade">
      <h3>${esc(m.name)}</h3>
      <div class="title">${esc(m.title)}</div>
      <div class="chips">
        ${(m.tags || []).map(t => `<span class="chip">${esc(t)}</span>`).join('')}
        ${m.on_leave ? `<span class="badge">Í fæðingarorlofi${m.show_leave_date && m.leave_until ? ' til ' + isDate(m.leave_until) : ''}</span>` : ''}
      </div>
      ${previewHtml(m)}
      <div class="actions">
        ${hasBio(m) ? `<button class="btn" id="open-full">Skoða ferilskrá</button>` : ''}
        ${m.email ? `<a class="mail" href="mailto:${esc(m.email)}">${esc(m.email)}</a>` : ''}
      </div>
    </div>`;
  const full = document.getElementById('open-full');
  if (full) full.onclick = () => openBio(m);
  document.querySelectorAll('.thumb').forEach(t => t.setAttribute('aria-current', t.dataset.id === m.id));
}

function renderThumbs() {
  const list = filtered();
  document.getElementById('rail-label').textContent = list.length === 1 ? '1 sjúkraþjálfari' : list.length + ' í hópnum';
  document.getElementById('thumbs').innerHTML = list.map(m =>
    `<button class="thumb" data-id="${m.id}" aria-label="${esc(m.name)}" title="${esc(m.name)}">${photoOrInitials(m)}</button>`).join('');
  if (list.length && !list.includes(current)) showPerson(list[0]);
  else if (current) document.querySelectorAll('.thumb').forEach(t => t.setAttribute('aria-current', t.dataset.id === current.id));
}

document.getElementById('thumbs').addEventListener('click', e => {
  const b = e.target.closest('.thumb');
  if (!b) return;
  const m = STAFF.find(x => x.id === b.dataset.id);
  if (m && m !== current) showPerson(m);
});

const filtersEl = document.getElementById('tag-filters');
filtersEl.innerHTML = TAGS.map(t =>
  `<button class="${t === 'Allir' ? 'active' : ''}" data-tag="${esc(t)}" aria-pressed="${t === 'Allir'}">${esc(t)}</button>`).join('');
filtersEl.addEventListener('click', e => {
  const b = e.target.closest('button[data-tag]');
  if (!b) return;
  activeTag = b.dataset.tag;
  filtersEl.querySelectorAll('button').forEach(x => {
    const on = x === b;
    x.classList.toggle('active', on);
    x.setAttribute('aria-pressed', on);
  });
  renderThumbs();
});

sb('staff?select=id,name,title,photo_url,on_leave,leave_until,show_leave_date,email,tags,starfssvid,serhaefing,menntun,starfsferill,ahugamal&hidden=eq.false&order=sort.asc,name.asc').then(members => {
  STAFF = members;
  renderThumbs();
});

const modal = document.getElementById('modal');
function openBio(m) {
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-head">
      ${photoOrInitials(m)}
      <div>
        <h3>${esc(m.name)}</h3>
        <div class="title">${esc(m.title)}${m.on_leave ? ' · í fæðingarorlofi' + (m.show_leave_date && m.leave_until ? ' til ' + isDate(m.leave_until) : '') : ''}</div>
        ${m.email ? `<a href="mailto:${esc(m.email)}">${esc(m.email)}</a>` : ''}
      </div>
    </div>
    <div class="modal-bio">${bioHtml(m)}</div>`;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeBio() { modal.classList.remove('open'); document.body.style.overflow = ''; }
modal.addEventListener('click', e => { if (e.target === modal || e.target.closest('.modal-close')) closeBio(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBio(); });
</script>
</body>
</html>
